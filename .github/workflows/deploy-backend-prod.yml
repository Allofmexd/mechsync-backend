name: Deploy Backend Prod

on:
  push:
    branches:
      - prod
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-backend-prod
  cancel-in-progress: false

jobs:
  test-build-deploy:
    name: Test, build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests
        run: mvn --batch-mode --no-transfer-progress clean test

      - name: Build executable JAR
        run: mvn --batch-mode --no-transfer-progress clean package

      - name: Select deployable JAR
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t jars < <(find target -maxdepth 1 -type f -name '*.jar' ! -name 'original-*.jar' -print)

          if [[ "${#jars[@]}" -ne 1 ]]; then
            printf 'Expected exactly one deployable JAR, found %s\n' "${#jars[@]}" >&2
            printf '%s\n' "${jars[@]:-No matching JARs}" >&2
            exit 1
          fi

          cp -- "${jars[0]}" "$RUNNER_TEMP/mechsync-backend.jar"

      - name: Validate deployment secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          : "${EC2_HOST:?Missing EC2_HOST secret}"
          : "${EC2_USER:?Missing EC2_USER secret}"
          : "${EC2_PORT:?Missing EC2_PORT secret}"
          : "${EC2_SSH_PRIVATE_KEY:?Missing EC2_SSH_PRIVATE_KEY secret}"

      - name: Configure temporary SSH credentials
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$EC2_SSH_PRIVATE_KEY" | tr -d '\r' > "$RUNNER_TEMP/mechsync_prod_key"
          chmod 600 "$RUNNER_TEMP/mechsync_prod_key"
          host_keys="$(ssh-keyscan -T 10 -p "$EC2_PORT" -H "$EC2_HOST")"
          if [[ -z "$host_keys" ]]; then
            printf 'Could not obtain the SSH host key.\n' >&2
            exit 1
          fi
          printf '%s\n' "$host_keys" >> "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Upload JAR and deployment script
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
        shell: bash
        run: |
          set -euo pipefail
          scp \
            -P "$EC2_PORT" \
            -i "$RUNNER_TEMP/mechsync_prod_key" \
            -o BatchMode=yes \
            "$RUNNER_TEMP/mechsync-backend.jar" \
            deployment/scripts/deploy-backend-prod.sh \
            "$EC2_USER@$EC2_HOST:/tmp/"

      - name: Deploy and validate health
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
        shell: bash
        run: |
          set -euo pipefail
          ssh \
            -p "$EC2_PORT" \
            -i "$RUNNER_TEMP/mechsync_prod_key" \
            -o BatchMode=yes \
            "$EC2_USER@$EC2_HOST" \
            'sudo -n bash /tmp/deploy-backend-prod.sh /tmp/mechsync-backend.jar; result=$?; rm -f /tmp/deploy-backend-prod.sh; exit $result'

      - name: Remove temporary SSH credentials
        if: always()
        shell: bash
        run: |
          rm -f "$RUNNER_TEMP/mechsync_prod_key"
